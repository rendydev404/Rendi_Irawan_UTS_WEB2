<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | UTSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'bg-primary': 'var(--bg-primary)',
                        'bg-secondary': 'var(--bg-secondary)',
                        'bg-tertiary': 'var(--bg-tertiary)',
                        'border': 'var(--border)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'accent': 'var(--accent)',
                        'accent-hover': 'var(--accent-hover)',
                        'success': 'var(--success)',
                        'warning': 'var(--warning)',
                        'danger': 'var(--danger)',
                        'star': 'var(--star)',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-bg-primary text-text-primary font-sans antialiased min-h-screen flex flex-col">

    <!-- Navigation Placeholder -->
    <nav class="w-full py-4 px-6 md:px-12 border-b border-border bg-bg-primary">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter flex items-center gap-2">
                UTSmart.
            </a>
            <div class="flex items-center space-x-6">
                <button class="theme-toggle hover:text-text-secondary transition-colors" aria-label="Toggle Theme">
                    <span class="theme-icon"><i data-lucide="sun" class="w-5 h-5"></i></span>
                </button>
                 <a href="products.html" class="text-sm font-medium hover:text-text-secondary transition-colors">Continue Shopping</a>
                 
                <!-- Mobile Profile Menu -->
                <div class="md:hidden relative group cursor-pointer">
                    <button class="flex items-center dropdown-btn">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </button>
                    <!-- Mobile Dropdown -->
                    <div class="absolute right-0 mt-2 w-48 bg-bg-secondary dropdown-menu border border-border rounded-xl shadow-2xl opacity-0 invisible   transition-all duration-200 transform origin-top-right scale-95  overflow-hidden z-50">
                        <a href="index.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Home</a>
                        <a href="products.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Products</a>
                        <a href="wishlist.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Wishlist</a>
                        <a href="orders.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Orders</a>
                        
                        <div id="mobile-nav-auth-links">
                            <a href="login.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Log In</a>
                            <a href="register.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary">Sign Up</a>
                        </div>
                        <a href="#" id="mobile-nav-logout-btn" class="hidden block px-4 py-3 text-sm text-danger hover:bg-bg-tertiary">Log Out</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-12 px-6 lg:px-12 max-w-5xl mx-auto w-full page-content">
        
        <h1 class="text-3xl font-bold tracking-tight mb-8">Order History</h1>

        <div id="orders-container" class="space-y-6">
            <!-- Filled by JS -->
        </div>

    </main>

    <!-- Core JS -->
    <script src="js/storage.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/app.js"></script>

    <script>
        lucide.createIcons();

        Auth.requireLogin(async () => {
            const container = document.getElementById('orders-container');
            const orders = await Orders.getUserOrders();

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="bg-bg-secondary border border-border rounded-3xl p-12 text-center empty-state">
                        <i data-lucide="package" class="w-16 h-16 text-border mb-4 mx-auto"></i>
                        <h3 class="text-xl font-bold mb-2">No orders yet</h3>
                        <p class="text-text-secondary mb-6">When you place an order, it will appear here.</p>
                        <a href="products.html" class="inline-flex btn-primary bg-accent text-bg-primary font-bold px-6 py-3 rounded-xl">Start Shopping</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = orders.map(order => {
                let statusBadgeClass = 'bg-bg-tertiary text-text-secondary';
                if (order.status === 'Processing') statusBadgeClass = 'bg-warning/20 text-warning';
                if (order.status === 'Shipped') statusBadgeClass = 'bg-blue-500/20 text-blue-400';
                if (order.status === 'Delivered') statusBadgeClass = 'bg-success/20 text-success';

                return `
                    <div class="bg-bg-secondary border border-border rounded-2xl overflow-hidden group">
                        <!-- Header -->
                        <div class="p-6 border-b border-border flex flex-col md:flex-row justify-between md:items-center gap-4 bg-bg-tertiary/50">
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <span class="font-mono font-bold text-lg">${order.id}</span>
                                    <span class="text-xs px-2 py-1 rounded-md font-bold uppercase tracking-wider ${statusBadgeClass}">${order.status}</span>
                                </div>
                                <div class="text-sm text-text-secondary flex items-center gap-4">
                                    <span><i data-lucide="calendar" class="w-4 h-4 inline mr-1"></i> ${App.formatDate(order.date)}</span>
                                    <span><i data-lucide="credit-card" class="w-4 h-4 inline mr-1"></i> ${order.paymentMethod}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-text-secondary mb-1">Total Amount</div>
                                <div class="font-bold text-xl">${Cart.formatCurrency(order.total)}</div>
                            </div>
                        </div>

                        <!-- Items -->
                        <div class="p-6">
                            <div class="space-y-4">
                                ${order.items.map(item => `
                                    <div class="flex items-center gap-4">
                                        <div class="w-16 h-16 bg-white rounded-lg overflow-hidden flex-none">
                                            <img src="${item.image}" class="w-full h-full object-cover mix-blend-multiply">
                                        </div>
                                        <div class="flex-grow min-w-0">
                                            <h4 class="font-medium text-sm md:text-base line-clamp-1">${item.name}</h4>
                                            <div class="text-xs text-text-secondary mt-1 mb-2">Qty: ${item.quantity} × ${Cart.formatCurrency(item.price)}</div>
                                            
                                            ${order.status === 'Delivered' ? `
                                            <div class="flex items-center gap-1">
                                                <span class="text-xs text-text-secondary mr-2">${item.rating ? 'Your Rating:' : 'Rate Product:'}</span>
                                                <div class="flex" data-order="${order.id}" data-product="${item.id}">
                                                    ${[1, 2, 3, 4, 5].map(star => `
                                                    <button onclick="rateProduct('${order.id}', ${item.id}, ${star})" class="hover:text-star transition-colors ${item.rating >= star ? 'text-star' : 'text-border'}">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                                    </button>
                                                    `).join('')}
                                                </div>
                                            </div>
                                            ` : ''}
                                        </div>
                                        <div class="font-semibold text-sm md:text-base flex-none">
                                            ${Cart.formatCurrency(item.price * item.quantity)}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        });

        window.rateProduct = function(orderId, productId, rating) {
            // Rating bersifat lokal (tidak ada endpoint rating di backend untuk UAS ini)
            Toast.show(`Terima kasih atas rating ${rating} bintang!`, 'success');
        };
    </script>
</body>
</html>
