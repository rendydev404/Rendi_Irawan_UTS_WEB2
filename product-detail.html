<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail | UTSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'bg-primary': 'var(--bg-primary)',
                        'bg-secondary': 'var(--bg-secondary)',
                        'bg-tertiary': 'var(--bg-tertiary)',
                        'border': 'var(--border)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'accent': 'var(--accent)',
                        'accent-hover': 'var(--accent-hover)',
                        'success': 'var(--success)',
                        'warning': 'var(--warning)',
                        'danger': 'var(--danger)',
                        'star': 'var(--star)',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-bg-primary text-text-primary font-sans antialiased min-h-screen flex flex-col">

    <!-- Navigation Placeholder -->
    <nav class="w-full py-4 px-6 md:px-12 border-b border-border bg-bg-primary">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter flex items-center gap-2">
             UTSmart.
            </a>
            <div class="flex items-center space-x-6">
                <button class="theme-toggle hover:text-text-secondary transition-colors" aria-label="Toggle Theme">
                    <span class="theme-icon"><i data-lucide="sun" class="w-5 h-5"></i></span>
                </button>
                <a href="cart.html" class="relative hover:text-text-secondary transition-colors">
                    <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                    <span id="cart-badge" class="cart-badge hidden">0</span>
                </a>
                <!-- Mobile Profile Menu -->
                <div class="md:hidden relative group cursor-pointer">
                    <button class="flex items-center dropdown-btn">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </button>
                    <!-- Mobile Dropdown -->
                    <div class="absolute right-0 mt-2 w-48 bg-bg-secondary dropdown-menu border border-border rounded-xl shadow-2xl opacity-0 invisible   transition-all duration-200 transform origin-top-right scale-95  overflow-hidden z-50">
                        <a href="index.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Home</a>
                        <a href="products.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Products</a>
                        <a href="wishlist.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Wishlist</a>
                        <a href="orders.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Orders</a>
                        
                        <div id="mobile-nav-auth-links">
                            <a href="login.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary border-b border-border">Log In</a>
                            <a href="register.html" class="block px-4 py-3 text-sm hover:bg-bg-tertiary">Sign Up</a>
                        </div>
                        <a href="#" id="mobile-nav-logout-btn" class="hidden block px-4 py-3 text-sm text-danger hover:bg-bg-tertiary">Log Out</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-8 pb-24 px-6 lg:px-12 max-w-7xl mx-auto w-full page-content">
        
        <div class="breadcrumb text-sm text-text-secondary mb-8 flex items-center gap-2" id="breadcrumb">
            <a href="index.html" class="hover:text-accent transition-colors">Home</a>
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
            <a href="products.html" class="hover:text-accent transition-colors">Products</a>
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
            <span class="text-text-primary font-medium" id="bc-category">...</span>
        </div>

        <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-20">
            <!-- Loading Skeleton -->
            <div class="skeleton aspect-square rounded-3xl"></div>
            <div class="space-y-6">
                <div class="skeleton h-8 w-1/4"></div>
                <div class="skeleton h-12 w-3/4"></div>
                <div class="skeleton h-8 w-1/3"></div>
                <div class="skeleton h-24 w-full"></div>
            </div>
        </div>

    </main>

    <!-- Core JS -->
    <script src="js/storage.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>

    <script>
        lucide.createIcons();

        let currentProduct = null;
        let selectedQty = 1;

        window.addEventListener('products-loaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            if (!productId) {
                window.location.href = 'products.html';
                return;
            }

            currentProduct = Products.getById(productId);

            if (!currentProduct) {
                document.getElementById('product-container').innerHTML = '<div class="col-span-full py-20 text-center"><h2 class="text-2xl font-bold">Product not found</h2><a href="products.html" class="text-accent hover:underline mt-4 inline-block">Back to Products</a></div>';
                return;
            }

            renderProduct();
        });

        const renderProduct = () => {
            document.getElementById('bc-category').textContent = currentProduct.category;

            const hasDiscount = currentProduct.discount > 0;
            const discountedPrice = hasDiscount ? currentProduct.price - (currentProduct.price * (currentProduct.discount / 100)) : currentProduct.price;

            const container = document.getElementById('product-container');
            container.innerHTML = `
                <!-- Image Gallery -->
                <div class="relative bg-white rounded-3xl overflow-hidden aspect-square border border-border">
                    ${hasDiscount ? `<span class="badge absolute top-6 left-6 bg-danger text-white z-10 text-sm px-3 py-1 shadow-lg">${currentProduct.discount}% OFF</span>` : ''}
                    <img src="${currentProduct.image}" alt="${currentProduct.name}" class="w-full h-full object-cover mix-blend-multiply">
                </div>

                <!-- Product Info -->
                <div class="flex flex-col">
                    <div class="mb-6 border-b border-border pb-6">
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-text-secondary font-bold uppercase tracking-widest text-sm">${currentProduct.brand}</h2>
                            <div class="flex items-center text-star text-sm font-bold bg-bg-tertiary px-3 py-1 rounded-full border border-border">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="mr-1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                ${currentProduct.rating} <span class="text-text-secondary ml-1">(${currentProduct.reviewCount})</span>
                            </div>
                        </div>
                        
                        <h1 class="text-3xl md:text-5xl font-black tracking-tight mb-4">${currentProduct.name}</h1>
                        
                        <div class="flex items-end gap-4 mb-2">
                            <div class="text-3xl md:text-4xl font-bold ${hasDiscount ? 'text-danger' : 'text-text-primary'}">
                                ${Cart.formatCurrency(discountedPrice)}
                            </div>
                            ${hasDiscount ? `
                                <div class="text-lg text-text-secondary price-original mb-1">${Cart.formatCurrency(currentProduct.price)}</div>
                            ` : ''}
                        </div>
                        
                        <div class="text-sm ${currentProduct.stock > 0 ? 'text-success' : 'text-danger'} font-medium flex items-center gap-1.5 mt-4">
                            <i data-lucide="${currentProduct.stock > 0 ? 'check-circle-2' : 'x-circle'}" class="w-4 h-4"></i>
                            ${currentProduct.stock > 0 ? `In Stock (${currentProduct.stock} available)` : 'Out of Stock'}
                        </div>
                    </div>

                    <div class="mb-8">
                        <p class="text-text-secondary leading-relaxed text-lg">${currentProduct.description}</p>
                    </div>

                    <!-- Actions -->
                    <div class="mt-auto space-y-6">
                        <div class="flex items-center gap-6">
                            <span class="font-medium text-sm text-text-secondary">Quantity</span>
                            <div class="flex items-center bg-bg-secondary rounded-xl p-1 border border-border">
                                <button onclick="updateQty(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-bg-tertiary rounded-lg transition-colors text-text-secondary hover:text-accent disabled:opacity-50" id="btn-minus" ${currentProduct.stock <= 0 ? 'disabled' : ''}>
                                    <i data-lucide="minus" class="w-4 h-4"></i>
                                </button>
                                <span class="w-12 text-center font-bold text-lg" id="qty-display">1</span>
                                <button onclick="updateQty(1)" class="w-10 h-10 flex items-center justify-center hover:bg-bg-tertiary rounded-lg transition-colors text-text-secondary hover:text-accent disabled:opacity-50" id="btn-plus" ${currentProduct.stock <= 0 ? 'disabled' : ''}>
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <button onclick="handleAddToCart()" class="flex-grow btn-primary bg-accent text-bg-primary font-bold py-4 rounded-xl text-lg flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(255,255,255,0.15)] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none" ${currentProduct.stock <= 0 ? 'disabled' : ''}>
                                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                                Add to Cart
                            </button>
                            <button onclick="window.dispatchEvent(new CustomEvent('toggle-wishlist', {detail: ${currentProduct.id}}))" class="flex-none w-16 h-16 border border-border bg-bg-secondary rounded-xl flex items-center justify-center hover:bg-bg-tertiary transition-colors group">
                                <i data-lucide="heart" class="w-6 h-6 text-text-secondary group-hover:text-danger transition-colors heart-icon"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            
            // Check wishlist status visually if possible
            if (typeof Storage !== 'undefined') {
                const wishlist = Storage.get(STORAGE_KEYS.WISHLIST) || [];
                if (wishlist.includes(currentProduct.id)) {
                    document.querySelector('.heart-icon').setAttribute('fill', 'currentColor');
                    document.querySelector('.heart-icon').classList.add('text-danger');
                }
            }
        };

        window.updateQty = (change) => {
            if (!currentProduct) return;
            const newQty = selectedQty + change;
            if (newQty >= 1 && newQty <= currentProduct.stock) {
                selectedQty = newQty;
                document.getElementById('qty-display').textContent = selectedQty;
            }
        };

        window.handleAddToCart = () => {
            if (!currentProduct) return;
            Cart.add(currentProduct, selectedQty);
        };
    </script>
</body>
</html>
