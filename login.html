<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | UTSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'bg-primary': 'var(--bg-primary)',
                        'bg-secondary': 'var(--bg-secondary)',
                        'bg-tertiary': 'var(--bg-tertiary)',
                        'border': 'var(--border)',
                        'text-primary': 'var(--text-primary)',
                        'text-secondary': 'var(--text-secondary)',
                        'accent': 'var(--accent)',
                        'accent-hover': 'var(--accent-hover)',
                        'success': 'var(--success)',
                        'warning': 'var(--warning)',
                        'danger': 'var(--danger)',
                        'star': 'var(--star)',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-shop-pattern text-text-primary font-sans antialiased min-h-screen flex items-center justify-center p-6">
    
    <div class="w-full max-w-md bg-bg-secondary/80 backdrop-blur-xl border border-border rounded-3xl p-8 shadow-2xl relative z-10 animate-scale-in">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center justify-center gap-2 text-3xl font-black tracking-tighter mb-4">
                UTSmart.
            </a>
            <h1 class="text-2xl font-bold">Welcome back</h1>
            <p class="text-text-secondary text-sm mt-2">Enter your credentials to access your account</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-text-secondary">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <input type="email" id="email" name="email" required
                        class="w-full bg-bg-tertiary border border-border rounded-xl py-3 pl-12 pr-4 focus:border-text-secondary focus:bg-bg-secondary transition-all"
                        placeholder="you@example.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label for="password" class="block text-sm font-medium">Password</label>
                    <a href="#" class="text-xs text-text-secondary hover:text-accent transition-colors">Forgot password?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-text-secondary">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input type="password" id="password" name="password" required
                        class="w-full bg-bg-tertiary border border-border rounded-xl py-3 pl-12 pr-12 focus:border-text-secondary focus:bg-bg-secondary transition-all"
                        placeholder="••••••••">
                    <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-text-secondary hover:text-accent">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded border-border bg-bg-tertiary text-accent focus:ring-accent focus:ring-offset-bg-secondary">
                <label for="remember" class="ml-2 text-sm text-text-secondary">Remember me for 30 days</label>
            </div>

            <button type="submit" class="w-full btn-primary bg-accent text-bg-primary font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] transition-all flex justify-center items-center gap-2">
                Sign In
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-text-secondary">
            Don't have an account? 
            <a href="register.html" class="text-accent font-semibold hover:underline">Sign up now</a>
        </div>
        
        <!-- Admin hint -->
        <div class="mt-8 p-3 bg-blue-500/10 border border-blue-500/20 rounded-lg text-xs text-blue-400 text-center">
            <strong>Demo Admin:</strong> admin@utsmart.com / admin123
        </div>
    </div>

    <!-- Core JS -->
    <script src="js/storage.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        lucide.createIcons();

        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = 'index.html';
        }

        // Toggle password visibility
        const toggleBtn = document.getElementById('toggle-password');
        const passInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            
            // Toggle icon
            toggleBtn.innerHTML = type === 'password' ? 
                '<i data-lucide="eye" class="w-5 h-5"></i>' : 
                '<i data-lucide="eye-off" class="w-5 h-5"></i>';
            lucide.createIcons();
        });

        // Form submission
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button[type="submit"]');
            
            // Loading state
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing...';
            lucide.createIcons();
            btn.disabled = true;

            (async () => {
                const result = await Auth.login(email, password);

                if (result.success) {
                    Toast.show(result.message, 'success');
                    setTimeout(() => {
                        window.location.href = result.isAdmin ? 'admin.html' : 'index.html';
                    }, 1000);
                } else {
                    Toast.show(result.message, 'error');
                    // Reset button
                    btn.innerHTML = 'Sign In <i data-lucide="arrow-right" class="w-4 h-4"></i>';
                    lucide.createIcons();
                    btn.disabled = false;
                }
            })();
        });
    </script>
</body>
</html>
